<!DOCTYPE html>
<html>
<head>
    <title>Session Management</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        #result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>Session Management Demo</h2>

<input
    type="text"
    id="username"
    placeholder="Enter Username">

<br>

<button onclick="login()">
    Login
</button>

<button onclick="checkProfile()">
    Check Session
</button>

<button onclick="logout()">
    Logout
</button>

<div id="result"></div>

<script>

async function login() {

    const username =
        document.getElementById("username").value;

    const response = await fetch(
        "http://localhost:3000/login",
        {
            method: "POST",
            headers: {
                "Content-Type":
                "application/json"
            },
            body: JSON.stringify({
                username
            })
        }
    );

    const data = await response.json();

    document.getElementById(
        "result"
    ).innerHTML = data.message;
}

async function checkProfile() {

    const response = await fetch(
        "http://localhost:3000/profile"
    );

    const data = await response.json();

    document.getElementById(
        "result"
    ).innerHTML =
        JSON.stringify(data);
}

async function logout() {

    const response = await fetch(
        "http://localhost:3000/logout"
    );

    const data = await response.json();

    document.getElementById(
        "result"
    ).innerHTML = data.message;
}

</script>

</body>
</html>
